services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Variabel NEXT_PUBLIC_* perlu diteruskan saat build
        NEXT_PUBLIC_REFRESH_INTERVAL: ${NEXT_PUBLIC_REFRESH_INTERVAL:-300000}
    image: dashboard-satudata:latest
    container_name: dashboard-satudata
    restart: unless-stopped
    ports:
      - "3015:3015"
    environment:
      NODE_ENV: production
      AUTH_URL: "https://svc-monevss.kotabogor.go.id"
      AUTH_TRUST_HOST: "true"

    # Memuat semua konfigurasi langsung dari .env.local
    env_file:
      - .env.local

    networks:
      - satudata-net

    # Health check — pastikan app merespons sebelum dianggap "healthy"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3015/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  satudata-net:
    driver: bridge
